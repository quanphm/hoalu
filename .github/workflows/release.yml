name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    outputs:
      is_version_bump: ${{ steps.check.outputs.is_version_bump }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if this is a version bump commit
        id: check
        run: |
          # Get the latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Check if it's a version bump (PR merge or direct commit)
          IS_VERSION_BUMP=false
          if echo "$COMMIT_MSG" | grep -qi "chore(ci): version"; then
            IS_VERSION_BUMP=true
            echo "Detected version bump from commit message"
          fi

          # Also check if package.json was modified (additional safeguard)
          if git diff --name-only HEAD~1 HEAD | grep -q "package.json"; then
            echo "package.json was modified in this commit"
            IS_VERSION_BUMP=true
          fi

          echo "is_version_bump=$IS_VERSION_BUMP" >> $GITHUB_OUTPUT
          if [ "$IS_VERSION_BUMP" = "true" ]; then
            echo "This is a version bump commit - will trigger release"
          else
            echo "This is not a version bump commit - skipping release"
          fi

      - name: Read version from apps/app/package.json
        id: version
        run: |
          VERSION=$(grep '"version"' apps/app/package.json | head -1 | cut -d'"' -f4)
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Tag: $TAG"

  create-release:
    needs: check-version-bump
    if: github.event_name == 'workflow_dispatch' || needs.check-version-bump.outputs.is_version_bump == 'true'
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' apps/app/package.json | head -1 | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create or update release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            Version ${{ steps.version.outputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: false
          allow_updates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
