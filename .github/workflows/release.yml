name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    outputs:
      is_version_bump: ${{ steps.check.outputs.is_version_bump }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if this is a version bump commit
        id: check
        run: |
          # Get the latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Check if it's a version bump (PR merge or direct commit)
          IS_VERSION_BUMP=false
          if echo "$COMMIT_MSG" | grep -qi "chore(ci): version"; then
            IS_VERSION_BUMP=true
            echo "Detected version bump from commit message"
          fi

          # Also check if package.json was modified (additional safeguard)
          if git diff --name-only HEAD~1 HEAD | grep -q "package.json"; then
            echo "package.json was modified in this commit"
            IS_VERSION_BUMP=true
          fi

          echo "is_version_bump=$IS_VERSION_BUMP" >> $GITHUB_OUTPUT
          if [ "$IS_VERSION_BUMP" = "true" ]; then
            echo "This is a version bump commit - will trigger release"
          else
            echo "This is not a version bump commit - skipping release"
          fi

      - name: Read version from apps/app/package.json
        id: version
        run: |
          VERSION=$(grep '"version"' apps/app/package.json | head -1 | cut -d'"' -f4)
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Tag: $TAG"

  create-release:
    needs: check-version-bump
    if: github.event_name == 'workflow_dispatch' || needs.check-version-bump.outputs.is_version_bump == 'true'
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get version from apps/app/package.json
        id: version
        run: |
          VERSION=$(grep '"version"' apps/app/package.json | head -1 | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create or update release
        id: create_release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          DRAFT_FLAG=""
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          # Check if release exists
          if gh release view "$TAG" --json id 2>/dev/null; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes "Version ${{ steps.version.outputs.version }}" \
              $DRAFT_FLAG
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Version ${{ steps.version.outputs.version }}" \
              $DRAFT_FLAG \
              --prerelease=false
          fi

          # Get release info for outputs
          RELEASE_INFO=$(gh release view "$TAG" --json id,url)
          echo "id=$(echo "$RELEASE_INFO" | jq -r '.id')" >> $GITHUB_OUTPUT
          echo "upload_url=$(echo "$RELEASE_INFO" | jq -r '.url')" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: [check-version-bump, create-release]
    if: github.event_name == 'workflow_dispatch' || needs.check-version-bump.outputs.is_version_bump == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            asset_name: hoalu-desktop-darwin-aarch64.dmg
          - target: x86_64-apple-darwin
            arch: x86_64
            asset_name: hoalu-desktop-darwin-x86_64.dmg
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build
        working-directory: apps/desktop

      - name: Build Tauri app (unsigned)
        run: bun tauri build --target ${{ matrix.target }} --no-sign
        working-directory: apps/desktop

      - name: Find and rename DMG file
        id: find_dmg
        run: |
          ORIGINAL_DMG=$(find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          RENAMED_DMG="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/${{ matrix.asset_name }}"

          # Rename the DMG file
          cp "$ORIGINAL_DMG" "$RENAMED_DMG"

          echo "original_dmg=$ORIGINAL_DMG" >> $GITHUB_OUTPUT
          echo "renamed_dmg=$RENAMED_DMG" >> $GITHUB_OUTPUT
          echo "Original DMG: $ORIGINAL_DMG"
          echo "Renamed to: $RENAMED_DMG"

      - name: Upload to release
        run: |
          gh release upload "${{ needs.check-version-bump.outputs.tag }}" \
            "${{ steps.find_dmg.outputs.renamed_dmg }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
