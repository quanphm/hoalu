name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"
        required: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check if on main branch
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "Error: This workflow can only run on the main branch"
            exit 1
          fi

      - name: Read current version from git tag
        id: current
        run: |
          # Get the latest v* tag and extract version
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "Error: No v* tag found"
            exit 1
          fi
          # Extract version from vX.Y.Z
          CURRENT_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.current }}"
          TYPE="${{ inputs.version_type }}"

          # Parse version components
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          # Bump version based on type
          case $TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update Cargo.toml
        run: |
          sed -i "s/^version = \"${{ steps.current.outputs.current }}\"/version = \"${{ steps.new.outputs.new }}\"/" apps/desktop/src-tauri/Cargo.toml

      - name: Update all package.json files
        run: |
          # Find and update all package.json files
          find . -name "package.json" -not -path "./node_modules/*" -not -path "*/node_modules/*" | while read -r file; do
            if grep -q "\"version\": \"${{ steps.current.outputs.current }}\"" "$file"; then
              sed -i "s/\"version\": \"${{ steps.current.outputs.current }}\"/\"version\": \"${{ steps.new.outputs.new }}\"/" "$file"
              echo "Updated: $file"
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/version-bump-${{ steps.new.outputs.new }}
          base: main
          commit-message: "chore(ci): version bump to ${{ steps.new.outputs.new }}"
          title: "chore(ci): version bump"
          body: |
            ## Version Bump

            **From:** ${{ steps.current.outputs.current }}
            **To:** ${{ steps.new.outputs.new }}
            **Type:** ${{ inputs.version_type }}

            ### Changes
            - Updated `Cargo.toml` version
            - Updated `package.json` version (if applicable)
          delete-branch: true
