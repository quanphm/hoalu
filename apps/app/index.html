<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script>
			(function () {
				try {
					var s = localStorage.getItem("theme");
					var t = ["light", "dark", "creamy", "deluge"];
					var c = { light: "#f9f7f3", dark: "#242a3a", creamy: "#f8f4eb", deluge: "#1a1f3a" };
					var r;
					if (t.indexOf(s) !== -1) {
						r = s;
					} else {
						r = matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light";
					}
					var h = document.documentElement;
					for (var i = 0; i < t.length; i++) h.classList.remove(t[i]);
					h.classList.add(r);
					h.style.colorScheme = r === "dark" || r === "deluge" ? "dark" : "light";
					h.style.backgroundColor = c[r];
					var m = document.querySelectorAll('meta[name="theme-color"]');
					for (var j = 0; j < m.length; j++) m[j].setAttribute("content", c[r]);
				} catch (e) {}
			})();
		</script>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#f9f7f3" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#242a3a" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Hoalu" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
		<link rel="shortcut icon" href="/images/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
		<link href="/src/styles/global.css" rel="stylesheet" />
		<title>Hoalu</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
